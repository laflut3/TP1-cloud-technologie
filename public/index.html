<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f3ee;
        --paper: #fffdf9;
        --ink: #102a36;
        --accent: #0f766e;
        --accent-soft: #d1f2ee;
        --warn: #c2410c;
        --ok: #166534;
        --line: #d6d3cd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 10%, #ffd89f 0%, #ffd89f00 32%),
          radial-gradient(circle at 92% 90%, #8ad9cf 0%, #8ad9cf00 30%),
          var(--bg);
        padding: 20px;
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .hero {
        border: 1px solid var(--line);
        background: linear-gradient(135deg, #fff8ef, #f0fffc);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 24px #102a3618;
        animation: rise 420ms ease-out both;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
      }

      .hero p {
        margin: 0;
        opacity: 0.85;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 8px 16px #102a360d;
        animation: rise 420ms ease-out both;
      }

      .panel:nth-child(1) { animation-delay: 40ms; }
      .panel:nth-child(2) { animation-delay: 80ms; }
      .panel:nth-child(3) { animation-delay: 120ms; }
      .panel:nth-child(4) { animation-delay: 160ms; }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 1rem;
        font-family: "Space Grotesk", sans-serif;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 0.84rem;
        opacity: 0.86;
      }

      input,
      select,
      textarea,
      button {
        width: 100%;
        font: inherit;
        border-radius: 10px;
      }

      input,
      select,
      textarea {
        border: 1px solid var(--line);
        background: #fff;
        padding: 10px 11px;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      button {
        border: 0;
        padding: 10px 12px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: white;
        transition: transform 120ms ease, filter 120ms ease;
      }

      button:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      .btn-soft {
        background: var(--accent-soft);
        color: var(--ink);
      }

      .btn-danger {
        background: #fef2f2;
        color: var(--warn);
        border: 1px solid #fecaca;
      }

      .result {
        border: 1px solid var(--line);
        background: #0f1f26;
        color: #e5f0f5;
        border-radius: 16px;
        padding: 14px;
        animation: rise 420ms ease-out both;
        animation-delay: 200ms;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
        font-size: 0.85rem;
      }

      .badge {
        padding: 3px 8px;
        border-radius: 999px;
        background: #22333b;
      }

      .badge.ok { background: #123a2e; color: #92f2cc; }
      .badge.err { background: #4a1c1c; color: #ffc2c2; }

      pre {
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.87rem;
        line-height: 1.35;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>Todo Control Panel</h1>
        <p>Interface rapide pour tester tes routes API sans passer par des commandes curl.</p>
      </section>

      <section class="panel">
        <h2>Configuration</h2>
        <div class="stack">
          <label for="base-url">Base URL API</label>
          <input id="base-url" type="text" />
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Lecture</h2>
          <div class="stack">
            <button id="get-all">GET /todos</button>
            <div class="row">
              <button class="btn-soft" id="get-pending">GET /todos?status=pending</button>
              <button class="btn-soft" id="get-done">GET /todos?status=done</button>
            </div>
            <button class="btn-soft" id="get-overdue">GET /todos/overdue</button>
          </div>
        </article>

        <article class="panel">
          <h2>Créer Une Tâche</h2>
          <form id="create-form" class="stack">
            <label for="create-title">title *</label>
            <input id="create-title" required />
            <label for="create-description">description</label>
            <textarea id="create-description"></textarea>
            <label for="create-due">due_date</label>
            <input id="create-due" type="date" />
            <button type="submit">POST /todos</button>
          </form>
        </article>

        <article class="panel">
          <h2>Modifier Une Tâche</h2>
          <form id="patch-form" class="stack">
            <label for="patch-id">id *</label>
            <input id="patch-id" type="number" min="1" required />
            <label for="patch-title">title (optionnel)</label>
            <input id="patch-title" />
            <label for="patch-status">status (optionnel)</label>
            <select id="patch-status">
              <option value="">(inchangé)</option>
              <option value="pending">pending</option>
              <option value="done">done</option>
            </select>
            <button type="submit">PATCH /todos/:id</button>
          </form>
        </article>

        <article class="panel">
          <h2>Supprimer Une Tâche</h2>
          <form id="delete-form" class="stack">
            <label for="delete-id">id *</label>
            <input id="delete-id" type="number" min="1" required />
            <button class="btn-danger" type="submit">DELETE /todos/:id</button>
          </form>
        </article>
      </section>

      <section class="result">
        <div class="meta">
          <span class="badge" id="res-method">READY</span>
          <span class="badge" id="res-status">-</span>
          <span class="badge" id="res-url">-</span>
        </div>
        <pre id="response-body">Clique sur une action pour voir la réponse ici.</pre>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      const baseUrlInput = $("base-url");
      const methodEl = $("res-method");
      const statusEl = $("res-status");
      const urlEl = $("res-url");
      const bodyEl = $("response-body");

      baseUrlInput.value = window.location.origin;

      function cleanBaseUrl(url) {
        return (url || window.location.origin).trim().replace(/\/+$/, "");
      }

      function setResult({ method, url, status, payload }) {
        methodEl.textContent = method;
        urlEl.textContent = url;
        if (status === null || status === undefined) {
          statusEl.className = "badge";
          statusEl.textContent = "-";
        } else {
          statusEl.textContent = String(status);
          statusEl.className = `badge ${status >= 200 && status < 300 ? "ok" : "err"}`;
        }
        bodyEl.textContent =
          payload === undefined
            ? ""
            : typeof payload === "string"
              ? payload
              : JSON.stringify(payload, null, 2);
      }

      async function api(method, path, body) {
        const base = cleanBaseUrl(baseUrlInput.value);
        const url = `${base}${path}`;

        try {
          const response = await fetch(url, {
            method,
            headers: body ? { "Content-Type": "application/json" } : {},
            body: body ? JSON.stringify(body) : undefined,
          });

          const rawText = await response.text();
          let parsed;
          try {
            parsed = rawText ? JSON.parse(rawText) : "";
          } catch {
            parsed = rawText;
          }

          setResult({ method, url, status: response.status, payload: parsed });
        } catch (err) {
          setResult({ method, url, status: 0, payload: `Network error: ${err.message}` });
        }
      }

      $("get-all").addEventListener("click", () => api("GET", "/todos"));
      $("get-pending").addEventListener("click", () => api("GET", "/todos?status=pending"));
      $("get-done").addEventListener("click", () => api("GET", "/todos?status=done"));
      $("get-overdue").addEventListener("click", () => api("GET", "/todos/overdue"));

      $("create-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const title = $("create-title").value.trim();
        const description = $("create-description").value.trim();
        const dueDate = $("create-due").value;

        const payload = { title };
        if (description) payload.description = description;
        if (dueDate) payload.due_date = dueDate;

        api("POST", "/todos", payload);
      });

      $("patch-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const id = $("patch-id").value.trim();
        const title = $("patch-title").value;
        const status = $("patch-status").value;

        const payload = {};
        if (title !== "") payload.title = title;
        if (status !== "") payload.status = status;

        api("PATCH", `/todos/${id}`, payload);
      });

      $("delete-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const id = $("delete-id").value.trim();
        api("DELETE", `/todos/${id}`);
      });
    </script>
  </body>
</html>
